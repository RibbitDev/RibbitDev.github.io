<body class="funky-home">

    <img src="assets/images/flower_button_2.png" alt="" class="deco-sticker funky-flower-2">
    <img src="assets/images/heart_button.png" alt="" class="deco-sticker funky-heart">

    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">

    <div class="top-bar">

            <nav class="nav-links">
                <!-- <a href="pages/projects.html">Projects</a>

            <nav class="nav-links">

            <!-- <a href="pages/projects.html" class="mobile-nav-link">Projects</a>

            <a href="pages/about.html" class="mobile-nav-link">About</a>
            <a href="pages/resume.html" class="mobile-nav-link">Resume</a>
        </nav>

    <main class="funky-container">
        <!-- Hero Section -->
        <section class="funky-hero">
            <div class="funky-photo-area">
                <div class="funky-washi tape-1"></div>
                <div class="funky-washi tape-2"></div>
                <div class="funky-polaroid">
                    <img src="assets/images/me.png" alt="Cheyenne" class="funky-photo">
                    <span class="funky-caption">me c:</span>
                </div>
            </div>
            
            <div class="funky-intro">
                <h1 class="funky-title">
                    <span class="funky-hi">Hiya!</span>
                    <span class="funky-name">I'm Cheyenne</span>
                </h1>
                <p class="funky-tagline">IT student majoring in AI • Creative coder • Frog enthusiast</p>
                <div class="funky-badges">
                    <span class="funky-badge badge-1">AI Enthusiast</span>
                    <span class="funky-badge badge-2">Creative Coder</span>
                    <span class="funky-badge badge-3">Problem Solver</span>
                    <span class="funky-badge badge-4">Certified Frog Lover</span>
                </div>
            </div>
        </section>

        <!-- Quote -->
        <section class="funky-quote-section">
            <div class="funky-note">
                <img src="assets/images/quote.png" alt="" class="quote">
            </div>
        </section>

        <!-- CTA -->
        <section class="funky-cta">
            <p class="cta-text">Want to know more?</p>
            <a href="pages/resume.html" class="funky-btn">
                <span>Check Out My Resume</span>
                <span class="btn-arrow">→</span>
